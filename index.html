<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOULAB — Розыгрыш Шокобоксов</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{
  font-family:'Inter',sans-serif;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(1100px 700px at 80% 15%, rgba(185,151,91,.07) 0%, transparent 55%),
    radial-gradient(800px 600px at 10% 90%, rgba(185,151,91,.05) 0%, transparent 60%),
    linear-gradient(160deg,#FBF8F3 0%,#F6F1E8 55%,#F9F5EE 100%);
  background-attachment:fixed;
  color:#2A2622;
}

/* ─ LAYOUT ─ */
.shell{
  position:relative;z-index:1;
  height:100dvh;
  display:grid;
  grid-template-rows:60px 1fr;
  overflow:hidden;
}

/* ─ NAV ─ */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  background:rgba(251,248,243,.7);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(185,151,91,.22);
  flex-shrink:0;
}
.logo{font-size:19px;font-weight:800;letter-spacing:5px;color:#2A2622}
.logo span{color:#B9975B}
.nav-btn{
  background:transparent;color:#8C744A;
  border:1px solid rgba(185,151,91,.5);
  padding:9px 24px;border-radius:100px;
  font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;text-decoration:none;
  transition:all .2s;
}
.nav-btn:hover{background:#2A2622;color:#FBF8F3;border-color:#2A2622}

/* ─ MAIN ─ */
main{
  display:grid;
  grid-template-columns:minmax(340px,48%) 1fr;
  gap:0;
  height:100%;
  overflow:hidden;
}

/* ─ LEFT: HERO ─ */
.hero{
  display:flex;flex-direction:column;justify-content:center;
  padding:28px 36px 28px 56px;
  position:relative;
  gap:0;
}

.pill{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(185,151,91,.08);
  border:1px solid rgba(185,151,91,.4);
  border-radius:100px;padding:12px 26px;
  font-size:14px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:#8C744A;
  width:fit-content;margin-bottom:24px;
}
.dot{
  width:8px;height:8px;background:#B9975B;
  border-radius:50%;animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.55)}}

h1{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(38px,4.2vw,66px);
  font-weight:700;line-height:1.04;
  letter-spacing:-.5px;margin-bottom:18px;
  color:#211D18;
}
h1 em{font-style:italic;color:#B9975B}

.sub{
  font-size:15px;line-height:1.65;
  color:rgba(42,38,34,.6);
  max-width:400px;margin-bottom:28px;
}
.sub strong{color:#2A2622;font-size:16px;font-weight:600}

.cta{
  display:inline-flex;align-items:center;gap:11px;
  background:#211D18;
  color:#FBF8F3;
  padding:17px 34px;border-radius:14px;
  font-size:15px;font-weight:700;text-decoration:none;
  letter-spacing:1.5px;text-transform:uppercase;
  width:fit-content;
  transition:transform .15s,box-shadow .15s,background .2s;
  box-shadow:0 8px 28px rgba(42,38,34,.18);
}
.cta:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(42,38,34,.24);background:#33291C}
.cta svg{width:18px;height:18px}

.stats{
  display:flex;gap:32px;
  margin-top:26px;padding-top:22px;
  border-top:1px solid rgba(185,151,91,.25);
}
.sn{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:700;color:#8C744A}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(42,38,34,.45);margin-top:3px}

/* ─ RIGHT: BOXES ─ */
.boxes-panel{
  display:flex;flex-direction:column;justify-content:center;
  padding:20px 28px 20px 12px;
  position:relative;
  overflow:visible;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:14px;
  height:calc(100dvh - 60px - 40px);
  max-height:520px;
}

/* Зоны под товары: мягкие тёплые плашки, товар без фона «парит» внутри */
.box{
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(185,151,91,.16);
  transition:transform .22s,box-shadow .22s,border-color .22s;
  position:relative;
  cursor:pointer;
  min-height:0;
  display:flex;align-items:center;justify-content:center;
  padding:10%;
}
/* чередование тёплых нюансов — лёгкое зонирование */
.box:nth-child(5n+1){background:linear-gradient(165deg,#F3EDE2 0%,#EDE5D6 100%)}
.box:nth-child(5n+2){background:linear-gradient(165deg,#F5EEE9 0%,#EFE4DC 100%)}
.box:nth-child(5n+3){background:linear-gradient(165deg,#EFEEE6 0%,#E7E6DA 100%)}
.box:nth-child(5n+4){background:linear-gradient(165deg,#F6F0E4 0%,#EEE6D4 100%)}
.box:nth-child(5n+5){background:linear-gradient(165deg,#F2EBE4 0%,#EAE0D4 100%)}

.box:hover{
  transform:scale(1.05) rotate(0deg)!important;
  box-shadow:0 18px 40px rgba(42,38,34,.16);
  border-color:rgba(185,151,91,.45);
  z-index:10;
}

/* Лёгкие повороты — не выходят за пределы */
.box:nth-child(1) {transform:rotate(-1.2deg) translateY(-3px)}
.box:nth-child(2) {transform:rotate(1deg)    translateY(3px)}
.box:nth-child(3) {transform:rotate(-.8deg)  translateY(-4px)}
.box:nth-child(4) {transform:rotate(1.2deg)  translateY(2px)}
.box:nth-child(5) {transform:rotate(-1deg)   translateY(-2px)}
.box:nth-child(6) {transform:rotate(1.4deg)  translateY(4px)}
.box:nth-child(7) {transform:rotate(-.8deg)  translateY(-3px)}
.box:nth-child(8) {transform:rotate(.8deg)   translateY(3px)}
.box:nth-child(9) {transform:rotate(-1.4deg) translateY(-3px)}
.box:nth-child(10){transform:rotate(.6deg)   translateY(3px)}

/* товар без фона: вписан целиком, мягкая тень под ним */
.box img{
  width:100%;height:100%;
  object-fit:contain;display:block;
  filter:drop-shadow(0 10px 18px rgba(42,38,34,.22));
  transition:transform .25s;
}
.box:hover img{transform:translateY(-3px) scale(1.03)}

/* Заглушка */
.ph{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
}
.ph-i{font-size:24px;opacity:.3}
.ph-t{font-size:9px;color:rgba(42,38,34,.3);letter-spacing:1px;text-transform:uppercase;text-align:center}

/* ─ MOBILE ─ */
@media(max-width:768px){
  html,body{overflow:auto;height:auto}
  .shell{height:auto;grid-template-rows:54px auto}
  main{
    grid-template-columns:1fr;
    height:auto;overflow:visible;
    display:flex;flex-direction:column;
  }

  .hero{
    padding:36px 32px 32px 36px;
    min-height:62dvh;
    justify-content:center;
    order:1;
  }

  .pill{font-size:12px;padding:11px 22px;margin-bottom:20px}

  h1{
    font-size:clamp(42px,11vw,62px);
    margin-bottom:16px;
    line-height:1.05;
  }

  .sub{
    font-size:15px;
    line-height:1.6;
    max-width:100%;
    margin-bottom:26px;
  }

  .cta{
    width:100%;
    justify-content:center;
    padding:18px 28px;
    font-size:15px;
    border-radius:14px;
  }

  .stats{
    gap:26px;
    margin-top:24px;
    padding-top:20px;
  }
  .sn{font-size:22px}
  .sl{font-size:10px}

  .boxes-panel{
    order:2;
    padding:12px 20px 28px;
    overflow:visible;
  }

  .grid{
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(2,1fr);
    max-height:none;
    height:auto;
    aspect-ratio:5/2.4;
    gap:8px;
  }
  .box{padding:8%;border-radius:14px}
  .box:nth-child(n){transform:none}
  .box:nth-child(odd){transform:rotate(-1deg) translateY(-2px)}
  .box:nth-child(even){transform:rotate(1deg) translateY(2px)}
  .box:hover{transform:scale(1.04)!important}
}

@media(max-width:480px){
  .hero{padding:28px 24px 24px 28px;min-height:60dvh}
  h1{font-size:clamp(38px,11vw,54px)}
  .grid{aspect-ratio:5/2.6;gap:6px}
  .ph-i,.ph-t{display:none}
  nav{padding:0 18px}
  .boxes-panel{padding:8px 16px 24px}
}
</style>
</head>
<body>

<div class="shell">

  <!-- NAV -->
  <nav>
    <div class="logo">YOU<span>LAB</span></div>
    <a href="https://t.me/youlab" class="nav-btn" target="_blank">Участвовать →</a>
  </nav>

  <!-- MAIN -->
  <main>

    <!-- HERO -->
    <section class="hero">
      <div class="pill"><div class="dot"></div>Розыгрыш каждую неделю</div>
      <h1>Шанс на победу —<br><em>в твоих руках!</em></h1>
      <p class="sub">
        <strong>10 шокобоксов каждую неделю.</strong><br>
        Подпишитесь на канал — и получайте призы.
      </p>
      <a href="https://t.me/youlab" class="cta" target="_blank">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.69 7.97c-.12.58-.46.72-.93.45l-2.57-1.9-1.24 1.19c-.14.14-.25.25-.52.25l.19-2.65 4.83-4.36c.21-.19-.04-.29-.32-.1L7.9 15.26l-2.52-.79c-.55-.17-.56-.55.11-.81l9.86-3.8c.45-.17.85.11.29.94z" fill="#FBF8F3"/>
        </svg>
        Хочу участвовать
      </a>
      <div class="stats">
        <div><div class="sn">10</div><div class="sl">победителей</div></div>
        <div><div class="sn">0₽</div><div class="sl">участие</div></div>
        <div><div class="sn">каждую</div><div class="sl">неделю</div></div>
      </div>
    </section>

    <!-- BOXES -->
    <aside class="boxes-panel">
      <div class="grid">

        <!-- Кладите PNG без фона в img/ с именами box1.png … box10.png —
             страница подхватит их сама; пока их нет, показываются старые jpg -->
        <div class="box"><img data-n="1" alt="Шокобокс 1"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 1</div></div></div>
        <div class="box"><img data-n="2" alt="Шокобокс 2"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 2</div></div></div>
        <div class="box"><img data-n="3" alt="Шокобокс 3"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 3</div></div></div>
        <div class="box"><img data-n="4" alt="Шокобокс 4"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 4</div></div></div>
        <div class="box"><img data-n="5" alt="Шокобокс 5"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 5</div></div></div>
        <div class="box"><img data-n="6" alt="Шокобокс 6"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 6</div></div></div>
        <div class="box"><img data-n="7" alt="Шокобокс 7"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 7</div></div></div>
        <div class="box"><img data-n="8" alt="Шокобокс 8"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 8</div></div></div>
        <div class="box"><img data-n="9" alt="Шокобокс 9"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 9</div></div></div>
        <div class="box"><img data-n="10" alt="Шокобокс 10"><div class="ph"><div class="ph-i">📦</div><div class="ph-t">Бокс 10</div></div></div>

      </div>
    </aside>

  </main>
</div>

<script>
// Пробуем png без фона, если нет — старый jpg, если и его нет — заглушка
document.querySelectorAll('.box img').forEach(img=>{
  const n = img.dataset.n;
  const ph = img.nextElementSibling;
  if(ph) ph.style.display='none';
  img.onerror = ()=>{
    if(img.src.endsWith('.png')){
      img.src = `img/box${n}.jpg`;
      // у jpg фон не прозрачный — вписываем аккуратно, без тени
      img.style.filter = 'none';
      img.style.borderRadius = '10px';
    } else {
      img.style.display='none';
      if(ph) ph.style.display='flex';
    }
  };
  img.src = `img/box${n}.png`;
});
</script>
</body>
</html>
